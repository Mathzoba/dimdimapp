# =====================================================================
# Configuracao da aplicacao DimDimApp
# Os valores sao lidos de VARIAVEIS DE AMBIENTE (passadas no docker run),
# com valores padrao apos os ":" caso a variavel nao seja definida.
# =====================================================================

# Porta da aplicacao
server.port=${APP_PORT:8080}

# --- Conexao com o PostgreSQL ---
# IMPORTANTE: DB_HOST deve apontar para o NOME DO CONTAINER do banco
# (DNS interno da rede Docker) - nunca "localhost".
spring.datasource.url=jdbc:postgresql://${DB_HOST:db-dimdim}:${DB_PORT:5432}/${DB_NAME:dimdimdb}
spring.datasource.username=${DB_USER:dimdim}
spring.datasource.password=${DB_PASSWORD:dimdim123}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
# "update" cria/atualiza a tabela "clientes" automaticamente.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Aguarda o banco ficar disponivel antes de falhar (banco pode demorar a subir)
spring.datasource.hikari.initialization-fail-timeout=60000
